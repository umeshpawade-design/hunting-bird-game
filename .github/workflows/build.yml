name: Build APK from Nested Tarball

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev libbz2-dev libreadline-dev
        pip install --upgrade pip
        pip install --upgrade buildozer cython

    - name: Extract and Clean Project Files
      run: |
        # Workflows folder ke andar se tar file ko main folder me move karna
        cp .github/workflows/ReplitExport-umeshpawade007.tar.gz .
        
        # Fresh extraction
        tar -xzvf ReplitExport-umeshpawade007.tar.gz
        
        # Subfolder management
        if [ -d "umeshpawade007" ]; then
          mv umeshpawade007/* .
        elif [ -d "hunting-bird-game" ]; then
          mv hunting-bird-game/* .
        fi
        
        # Cache aur purani atki hui files ka clean-up
        rm -rf .buildozer buildozer.spec bin
        ls -la

    - name: Build with Buildozer
      run: |
        buildozer init
        sed -i 's/^title =.*/title = Hunting Bird/' buildozer.spec
        sed -i 's/^package.name =.*/package.name = huntingbird/' buildozer.spec
        sed -i 's/^package.domain =.*/package.domain = org.jmd/' buildozer.spec
        sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,jpeg,kv,atlas,mp3,wav/' buildozer.spec
        sed -i 's/^#\? \?android.api =.*/android.api = 33/' buildozer.spec
        
        export DEBIAN_FRONTEND=noninteractive
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hunting-Bird-APK
        path: bin/*.apk
