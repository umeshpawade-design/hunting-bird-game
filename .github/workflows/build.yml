[app]

# (str) Title of your application
title = Slingshot Empire

# (str) Package name
package.name = slingshotempire

# (str) Package domain (needed for android packaging)
package.domain = org.umeshpawade

# (str) Source code directory
source.dir = .

# (list) Source files to include (let empty to include all the files)
source.include_exts = py,png,jpg,jpeg,ttf,json,txt,bmp

# (list) Application requirements
# Pygame and Kivy variants explicitly declared for Android compatibility
requirements = python3, pygame==2.1.0, kivy, hostpython3

# (str) Supported orientations (one of landscape, sensorLandscape, portrait or all)
orientation = landscape

#
# Android specific
#

# (bool) Indicate if the application should be fullscreen or not
fullscreen = 1

# (int) Android API to use (API 33 is highly stable for Pygame on Android)
android.api = 33

# (int) Minimum API required
android.minapi = 21

# (str) Android NDK version to use
android.ndk = 25b

# (bool) Accept SDK license without prompting
android.accept_sdk_license = True

# (list) Permissions
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE

# (str) Bootstrap to use (sdl2 is the core backend for pygame/kivy)
android.bootstrap = sdl2
