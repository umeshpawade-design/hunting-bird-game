name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade buildozer Cython
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk

    - name: Auto Accept Android Licenses & Build APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        if [ -f "capture_preview.py" ]; then cp capture_preview.py main.py; fi
        
        # Buildozer directory pehle hi create kar rahe hain taaki tools manually accept ho sakein
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin || true
        
        # Sabse zaroori step: Pehle se hi saare android licenses ko yes karke bypass karna
        mkdir -p "$HOME/.android" && touch "$HOME/.android/repositories.cfg"
        
        # Buildozer ko non-interactive way mein chalayenge jisse license prompt block na ho
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        yes | buildozer android debug --workers=1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
