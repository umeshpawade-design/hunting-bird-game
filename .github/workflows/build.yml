name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and All System Dependencies
      run: |
        pip install --upgrade buildozer Cython
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool m4 pkg-config zlib1g-dev openjdk-17-jdk build-essential git

    - name: Pre-Setup Python-for-Android & Build APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        if [ -f "capture_preview.py" ]; then cp capture_preview.py main.py; fi
        
        # Missing folder ko pehle se clone karke set kar rahe hain
        mkdir -p ~/.buildozer/android/platform/
        git clone https://github.com/kivy/python-for-android.git ~/.buildozer/android/platform/python-for-android
        
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
