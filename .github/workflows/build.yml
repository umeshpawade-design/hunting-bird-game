name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and All System Dependencies
      run: |
        pip install --upgrade "buildozer<=1.5.0" Cython
        # Yahan humne libtool, m4, aur autoconf ke missing macros ko fix karne ke liye packages badhaye hain
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool m4 pkg-config zlib1g-dev openjdk-17-jdk build-essential

    - name: Silent Build APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        if [ -f "capture_preview.py" ]; then cp capture_preview.py main.py; fi
        
        # Macro errors aur gradle daemon errors ko disable karne ke flags
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        
        # Pure environment ko refresh karke fresh start karenge
        buildozer android clean
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
