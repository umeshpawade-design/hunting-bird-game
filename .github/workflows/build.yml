name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade "buildozer<=1.5.0" Cython
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk

    - name: Silent Build APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        if [ -f "capture_preview.py" ]; then cp capture_preview.py main.py; fi
        
        # Automatic license acceptance flag directly passed into terminal environment
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        
        # Bina prompt ke build shuru karenge
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
