name: Build Android APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool m4 pkg-config zlib1g-dev openjdk-17-jdk build-essential git ccache overlayroot libltdl-dev
    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade "buildozer<=1.5.0" Cython==0.29.36
    - name: Bypass Android Licenses & Build
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        if [ -f "capture_preview.py" ]; then cp capture_preview.py main.py; fi
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        mkdir -p ~/.android && touch "$HOME/.android/repositories.cfg"
        buildozer android debug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
