name: Build APK from Nested Tarball

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev libbz2-dev libreadline-dev
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Prepare Project Files
      run: |
        # Sahi folder check karna aur files ko main directory me lana
        if [ -d "artifacts/slingshot-empire" ]; then
          cp -r artifacts/slingshot-empire/* .
        elif [ -f "ReplitExport-umeshpawade007.tar.gz" ]; then
          tar -xzvf ReplitExport-umeshpawade007.tar.gz
          mv umeshpawade007/* . 2>/dev/null || true
        fi

        # CRITICAL FIX: Agar main.py nahi hai toh capture_preview.py ko rename karna
        if [ -f "capture_preview.py" ] && [ ! -f "main.py" ]; then
          mv capture_preview.py main.py
        fi

        # Safai aur validation
        rm -rf .buildozer buildozer.spec bin
        ls -la

    - name: Build with Buildozer
      run: |
        buildozer init
        
        # Application Config Injection
        sed -i 's/^title =.*/title = Hunting Bird/' buildozer.spec
        sed -i 's/^package.name =.*/package.name = huntingbird/' buildozer.spec
        sed -i 's/^package.domain =.*/package.domain = org.jmd/' buildozer.spec
        sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,jpeg,kv,atlas,mp3,wav,json/' buildozer.spec
        
        # SDK/NDK and License Settings
        sed -i 's/^#\? \?android.api =.*/android.api = 33/' buildozer.spec
        sed -i 's/^#\? \?android.ndk =.*/android.ndk = 25b/' buildozer.spec
        sed -i 's/^#\? \?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
        
        # System-level License pre-load
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n89354db274b065e119d62bfc40d48d65227d860d\nd56f5187479451e40a6137e7d6199bf9956d9e76" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        export PATH="/usr/bin:/usr/local/bin:$PATH"
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hunting-Bird-APK
        path: bin/*.apk
